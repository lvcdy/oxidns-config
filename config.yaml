# OxiDNS default configuration file
#
# See full documentation at:
# https://oxidns.org

log:
  level: info

# Management API (optional)
api:
  http:
    listen: "192.168.1.1:9199"
    # auth:
    #   type: basic
    #   username: admin
    #   password: secret
    # Optional static WebUI directory. Relative paths resolve from -d/--working-dir.
    # Debian packages use -d /var/lib/oxidns, so ./webui means /var/lib/oxidns/webui.
    # API routes are served under /api/*.
    webui:
      root: "/usr/share/oxidns/webui"

plugins:
  - tag: subscription_cron
    type: cron
    args:
      timezone: Asia/Shanghai
      jobs:
        - name: refresh_rule_subscriptions
          interval: 24h
          executors:
            - $subscription_refresh
  - tag: subscription_refresh
    type: sequence
    args:
      - exec: $subscription_download
      - exec: $reload_rule_providers
  - tag: subscription_download
    type: download
    args:
      timeout: 60s
      startup_if_missing: true
      downloads:
        - url: https://fastly.jsdelivr.net/gh/pmkol/easymosdns@rules/gfw_ip_list.txt
          dir: ./rules
          filename: gfw_ip.txt
        - url: https://anti-ad.net/adguard.txt
          dir: ./rules
          filename: adguard.txt
        - url: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
          dir: ./rules
          filename: geosite.dat
        - url: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip-only-cn-private.dat
          dir: ./rules
          filename: geoip.dat
  - tag: reload_rule_providers
    type: reload_provider
    args:
      - $geoip_cn
      - $geosite_cn
      - $geosite_no_cn
      - $category_ads_all
      - $ad_rules
      - $gfw_ip
  - tag: gfw_ip
    type: ip_set
    args:
      files:
        - ./rules/gfw_ip.txt
  - tag: ad_rules
    type: adguard_rule
    args:
      files:
        - ./rules/adguard.txt
  - tag: geoip_cn
    type: geoip
    args:
      file: ./rules/geoip.dat
      selectors:
        - cn
  - tag: geosite_cn
    type: geosite
    args:
      file: ./rules/geosite.dat
      selectors:
        - cn
  - tag: geosite_no_cn
    type: geosite
    args:
      file: ./rules/geosite.dat
      selectors:
        - geolocation-!cn
  - tag: category_ads_all
    type: geosite
    args:
      file: ./rules/geosite.dat
      selectors:
        - category-ads-all
        - win-spy
        #- win-update
        - win-extra
  - tag: hosts
    type: hosts
    args:
      short_circuit: false
  - tag: ecscn
    type: domain_set
    args:
      exps:
        - tv.micu.hk
        - tv1.micu.hk
        - v0.micu.hk
        - v1.micu.hk
        - v2.micu.hk
  - tag: ecs_noncn
    type: domain_set
  - tag: local_ptr
    type: domain_set
    args:
      exps:
        - 168.192.in-addr.arpa.
        - 16.172.in-addr.arpa.
        - 10.in-addr.arpa.
  - tag: lazy_cache
    type: cache
    args:
      size: 8192
      short_circuit: false
      lazy_cache_ttl: 86400
      cache_negative: true
      max_negative_ttl: 300
      negative_ttl_without_soa: 60
      max_positive_ttl: 3600
      ecs_in_key: true
      dump_file: ./rules/dns_cache.dump
      dump_interval: 3600
  - tag: query_recorder_main
    type: query_recorder
    args:
      path: ./rules/query-recorder-main.sqlite
      queue_size: 8192
      batch_size: 256
      flush_interval_ms: 200
      memory_tail: 1024
      retention_days: 3
      cleanup_interval_hours: 1
  - tag: block_seq
    type: sequence
    args:
      - matches: qtype 65 255
        exec: reject 0
      - matches: qname $category_ads_all
        exec: $ad_blackhole
      - matches: qname $ad_rules
        exec: $ad_blackhole
      - matches: qname $local_ptr
        exec: reject 3
  - tag: ad_blackhole
    type: black_hole
    args:
      ips:
        - 0.0.0.0
        - "::"
      short_circuit: true
  - tag: rate_limit
    type: rate_limiter
    args:
      qps: 200
      burst: 400
      mask4: 32
      mask6: 48
  - tag: forward_local
    type: forward
    args:
      concurrent: 3
      response_selection: balanced
      upstreams:
        - addr: https://doh.pub/dns-query
          bootstrap: 119.29.29.29:53
          insecure_skip_verify: false
          enable_http3: false
        - addr: https://dns.alidns.com/dns-query
          bootstrap: 223.5.5.5:53
          insecure_skip_verify: false
          enable_http3: false
        - addr: 180.184.1.1
          insecure_skip_verify: false
          enable_http3: false
      short_circuit: false
  - tag: forward_remote
    type: forward
    args:
      concurrent: 2
      response_selection: balanced
      upstreams:
        - addr: https://cloudflare-dns.com/dns-query
          bootstrap: 223.5.5.5:53
          insecure_skip_verify: false
          enable_http3: true
        - addr: https://dns.google/dns-query
          bootstrap: 223.5.5.5:53
          insecure_skip_verify: false
          enable_http3: true
      short_circuit: false
  - tag: local_seq
    type: sequence
    args:
      - exec: $forward_local
      - matches: resp_ip $geoip_cn
        exec: accept
      - exec: ttl 600
  - tag: remote_seq
    type: sequence
    args:
      - exec: $forward_remote
      - matches: has_resp
        exec: accept
      - exec: ttl 300
  - tag: main_sequence
    type: sequence
    args:
      - exec: $query_recorder_main
      - matches: "!$rate_limit"
        exec: reject 3
      - exec: $hosts
      - matches: has_resp
        exec: accept
      - exec: jump block_seq
      - exec: $lazy_cache
      - matches: has_resp
        exec: accept
      - matches: qname $ecscn
        exec: $forward_local
      - matches: has_resp
        exec: accept
      - matches: qname $ecs_noncn
        exec: $forward_remote
      - matches: has_resp
        exec: accept
      - matches: qname $geosite_cn
        exec: goto local_seq
      - matches: qname $geosite_no_cn
        exec: goto remote_seq
      - exec: goto remote_seq

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"
